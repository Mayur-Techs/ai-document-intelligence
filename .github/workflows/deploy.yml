name: CI → Deploy → Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Format, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TESTING: "true"
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      JWT_SECRET_KEY: test-secret-key-that-is-long-enough-for-testing-purposes
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      DISABLE_RATE_LIMIT: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff — lint check
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" | jq .

      - name: Wait for Render to start
        run: sleep 60

      - name: Smoke test — health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://doc-intelligence-api-tubh.onrender.com/health)
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "SMOKE TEST FAILED — production is not healthy after deploy"
            exit 1
          fi
          echo "Smoke test PASSED — production is healthy"

      - name: Smoke test — stats endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://doc-intelligence-api-tubh.onrender.com/api/v1/stats)
          echo "Stats endpoint HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "STATS ENDPOINT FAILED"
            exit 1
          fi
          echo "Stats endpoint OK"
