name: DocIntel CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: docai
          POSTGRES_PASSWORD: docai
          POSTGRES_DB: docai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql://docai:docai@localhost:5432/docai_test
          JWT_SECRET_KEY: test-secret-key-not-for-production
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TESTING: "true"
        run: |
          pytest tests/ -v --tb=short > pytest_run.log 2>&1 || touch failed.txt
          if [ -f failed.txt ]; then
            echo "Tests failed. Committing log..."
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git checkout -b ci-debug
            echo "=== PIP SHOW MISTRALAI ===" >> pytest_run.log
            pip show mistralai >> pytest_run.log 2>&1
            echo "=== PIP LIST ===" >> pytest_run.log
            pip list >> pytest_run.log 2>&1
            mv pytest_run.log ci_test_failure.log
            git add ci_test_failure.log
            git commit -m "chore: upload CI test failure log [skip ci]"
            git push -f origin ci-debug
            exit 1
          fi

      - name: Verify imports
        env:
          DATABASE_URL: postgresql://docai:docai@localhost:5432/docai_test
          JWT_SECRET_KEY: test-secret-key
        run: |
          python -c "from database.models import User, Document, ExtractedField"
          python -c "from auth.core import create_access_token, verify_password"
          python -c "from extractor.pipeline import process_document"
          echo "All imports OK"

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json"

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 15 \
            https://doc-intelligence-api-tubh.onrender.com/health

      - name: Notify on success
        run: echo "Deployed successfully to Render"
