name: Deploy to Render

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for deploy
        run: |
          echo "Waiting for deploy to complete..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s "${{ secrets.RENDER_SERVICE_URL }}/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "down")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "ok" ]; then echo "Deploy successful"; exit 0; fi
            sleep 10
          done
          echo "Deploy timed out" && exit 1
