services:
  - type: web
    name: doc-intelligence-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT_WHITELISTED_IPS
        value: ""
      - key: UPLOAD_DIR
        value: data/raw
      - key: DATABASE_URL
        fromDatabase:
          name: doc-intelligence-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CEREBRAS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        value: doc-intel-uploads
      - key: AWS_S3_REGION_NAME
        value: ap-south-1
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://aidocli.netlify.app

databases:
  - name: doc-intelligence-db
    databaseName: docai
    user: docai
    plan: free
