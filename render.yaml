services:
  - type: web
    name: doc-intelligence-api
    env: python
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 2 --timeout-keep-alive 65
    envVars:
      - key: DISABLE_RATE_LIMIT
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG_SECRET
        sync: false    # Set actual value in Render dashboard
      - key: JWT_SECRET_KEY
        sync: false    # Set actual value in Render dashboard
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        value: doc-intel-uploads
      - key: AWS_S3_REGION_NAME
        value: ap-south-1
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: doc-intelligence-db
    databaseName: docai
    user: docai
    plan: free
